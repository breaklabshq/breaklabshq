<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ae1ff"/>
      <stop offset="50%" stop-color="#40b8ff"/>
      <stop offset="100%" stop-color="#2d7dff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="460" height="200" rx="20" fill="url(#bg)"/>
  <text x="230" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" fill="url(#text-grad)" filter="url(#glow)" letter-spacing="8">BREAK</text>
  <text x="230" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#9ba8c7" letter-spacing="14">LABS</text>
</svg>
