<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg-f" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3c1a1a"/>
      <stop offset="100%" stop-color="#0a0305"/>
    </radialGradient>
    <linearGradient id="t-f" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5050"/>
      <stop offset="100%" stop-color="#ff2020"/>
    </linearGradient>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg-f)"/>
  <circle cx="200" cy="160" r="50" fill="none" stroke="url(#t-f)" stroke-width="3" filter="url(#glow-f)" opacity="0.5"/>
  <circle cx="200" cy="160" r="25" fill="url(#t-f)" opacity="0.15" filter="url(#glow-f)"/>
  <line x1="150" y1="160" x2="250" y2="160" stroke="url(#t-f)" stroke-width="2" filter="url(#glow-f)" opacity="0.4"/>
  <line x1="200" y1="110" x2="200" y2="210" stroke="url(#t-f)" stroke-width="2" filter="url(#glow-f)" opacity="0.4"/>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="40" fill="url(#t-f)" filter="url(#glow-f)" letter-spacing="6">FUSION</text>
  <text x="200" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#cc4444" letter-spacing="8">BREAK LABS</text>
</svg>
